port: 7880
bind_addresses:
  - 0.0.0.0

keys:
  devkey: secret

user_auth:
  jwt_secret: "stream-hub-dev-secret-key-at-least-32chars!"
  token_expiry: 24h
  min_username_length: 3
  min_password_length: 6

redis:
  address: localhost:6379
  # dial_timeout/read_timeout/write_timeout: not supported by current config struct

postgres:
  host: localhost
  port: 5432
  user: streamhub
  password: streamhub
  database: streamhub
  ssl_mode: disable
  max_conns: 50

development: true

rtc:
  # Phase 1: Send-Side BWE — SFU track departure time chính xác, giảm freeze dưới mạng yếu
  congestion_control:
    enabled: true
    allow_pause: true
    use_send_side_bwe: true
    use_send_side_bwe_interceptor: true
    send_side_bwe_pacer: leaky-bucket

  # Phase 1: PLI Throttle — tránh flood encoder khi mạng kém
  pli_throttle:
    low_quality: 3s
    mid_quality: 2s
    high_quality: 1500ms

  # Packet buffer — đủ cho 1080p@30fps@3Mbps + jitter buffer audio 4s
  packet_buffer_size_video: 3000
  packet_buffer_size_audio: 400

  # Phase 3 preview: giải phóng bandwidth layer cao nhanh hơn
  dynacast_pause_delay: 3s

logging:
  level: info
