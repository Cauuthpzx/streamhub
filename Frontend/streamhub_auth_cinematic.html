
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.u{--bg:#06060f;--surface:rgba(12,12,30,0.72);--glass:rgba(255,255,255,0.03);--bdr:rgba(255,255,255,0.055);--a:#818cf8;--a2:#a78bfa;--a3:#e879f9;--t1:#eef0ff;--t2:#8890b0;--t3:#4a5070;position:relative;width:100%;min-height:580px;font-family:'DM Sans',sans-serif;background:var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center;padding:32px;border-radius:16px}
.bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
canvas{position:absolute;inset:0;width:100%;height:100%}
.aur{position:absolute;inset:-40%;background:radial-gradient(ellipse 55% 45% at 35% 30%,rgba(99,102,241,0.18) 0%,transparent 65%),radial-gradient(ellipse 50% 55% at 70% 70%,rgba(168,85,247,0.14) 0%,transparent 55%),radial-gradient(ellipse 40% 35% at 60% 20%,rgba(232,121,249,0.08) 0%,transparent 50%);animation:ap 16s ease-in-out infinite}
@keyframes ap{0%,100%{transform:scale(1) rotate(0);opacity:1}50%{transform:scale(1.08) rotate(2deg);opacity:.85}}
.wv{position:absolute;bottom:0;left:0;right:0;height:80px;display:flex;align-items:flex-end;justify-content:center;gap:3px;opacity:.25;mask-image:linear-gradient(90deg,transparent,black 20%,black 80%,transparent)}
.wb{width:3px;border-radius:2px;background:linear-gradient(180deg,var(--a),var(--a3));animation:wu 1.5s ease-in-out infinite alternate}
@keyframes wu{0%{height:6px}100%{height:50px}}
.rr{position:absolute;left:25%;top:45%;transform:translate(-50%,-50%)}
.ri{position:absolute;border-radius:50%;border:1px solid rgba(129,140,248,0.06);transform:translate(-50%,-50%)}
.r1{width:300px;height:300px;animation:re 10s ease-in-out infinite}
.r2{width:500px;height:500px;animation:re 10s ease-in-out 2s infinite}
.r3{width:700px;height:700px;animation:re 10s ease-in-out 4s infinite}
@keyframes re{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:.1;transform:translate(-50%,-50%) scale(1.06)}}
.gr{position:absolute;inset:-50%;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;mix-blend-mode:overlay}
.vi{position:absolute;inset:0;background:radial-gradient(ellipse 65% 65% at 50% 50%,transparent 30%,rgba(6,6,15,0.85) 100%)}
.ly{position:relative;z-index:2;display:flex;width:100%;align-items:center;gap:60px;animation:si .8s cubic-bezier(.16,1,.3,1) .2s both}
@keyframes si{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.hc{flex:1.15;display:flex;align-items:center;justify-content:center}
.hi{max-width:460px;display:flex;flex-direction:column}
.lg{margin-bottom:28px;animation:fu .9s cubic-bezier(.16,1,.3,1) .2s both}
.li{width:52px;height:52px;margin-bottom:16px;filter:drop-shadow(0 0 24px rgba(129,140,248,.25))}
.li svg{width:100%;height:100%}
.sig{animation:sp2 2.5s ease-in-out infinite}
.s1{animation-delay:0s}.s2{animation-delay:.3s}.s3{animation-delay:.6s}
@keyframes sp2{0%,100%{opacity:.15;transform:translateY(0)}50%{opacity:.8;transform:translateY(-2px)}}
.ba{animation:bb 1.2s ease-in-out infinite alternate}
.b1{animation-delay:0s}.b2{animation-delay:.15s}.b3{animation-delay:.3s}.b4{animation-delay:.45s}.b5{animation-delay:.6s}
@keyframes bb{0%{transform:scaleY(.6)}100%{transform:scaleY(1.3)}}
.lt{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.ln{font-size:32px;font-weight:800;letter-spacing:3px;color:var(--t1)}
.la{background:linear-gradient(135deg,var(--a) 0%,var(--a3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ls{color:var(--t3);font-weight:300;font-size:28px}
.lb{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:4px;color:var(--a);opacity:.6}
.hd{font-size:14px;line-height:1.8;color:var(--t2);margin:0 0 32px;max-width:380px;animation:fu .9s cubic-bezier(.16,1,.3,1) .4s both}
@keyframes fu{from{opacity:0;transform:translateY(18px);filter:blur(6px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fc{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;background:var(--glass);border:1px solid var(--bdr);backdrop-filter:blur(12px);animation:fp .6s cubic-bezier(.34,1.56,.64,1) both;transition:border-color .3s,background .3s,transform .2s;cursor:default}
.fc:hover{border-color:rgba(129,140,248,.2);background:rgba(129,140,248,.04);transform:translateY(-2px)}
@keyframes fp{from{opacity:0;transform:scale(.9) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.fiw{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(129,140,248,.08);color:var(--a);flex-shrink:0}
.fs{width:16px;height:16px}
.ft{display:block;font-size:12.5px;font-weight:700;color:var(--t1);letter-spacing:.2px}
.fd{display:block;font-size:11px;color:var(--t3);line-height:1.4;margin-top:1px}
.cc{flex:0 0 auto;width:380px}
.ac{position:relative;padding:36px 32px;border-radius:28px;background:var(--surface);border:1px solid var(--bdr);backdrop-filter:blur(48px) saturate(1.4);box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 24px 80px rgba(0,0,0,.4),0 0 120px rgba(99,102,241,.04);overflow:hidden;animation:cl 1.1s cubic-bezier(.16,1,.3,1) .3s both}
@keyframes cl{from{opacity:0;transform:translateY(50px) scale(.96);filter:blur(6px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
.gt{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:60%;height:1.5px;background:linear-gradient(90deg,transparent 0%,var(--a) 25%,var(--a2) 50%,var(--a3) 75%,transparent 100%);opacity:.8;animation:gw 4s ease-in-out infinite}
.gt::after{content:'';position:absolute;top:0;left:10%;right:10%;height:40px;background:linear-gradient(180deg,rgba(129,140,248,.06),transparent);filter:blur(12px)}
@keyframes gw{0%,100%{width:50%;opacity:.6}50%{width:75%;opacity:1}}
.go{position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(232,121,249,.08),transparent 70%);filter:blur(30px);animation:od 8s ease-in-out infinite}
@keyframes od{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,15px)}}
.ch{margin-bottom:24px}
.ct{font-size:24px;font-weight:800;color:var(--t1);letter-spacing:-.6px;margin:0 0 4px}
.cs{font-size:13px;color:var(--t2);margin:0}
.af{display:flex;flex-direction:column;gap:14px}
.iw{display:flex;flex-direction:column;gap:5px}
.il{font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.3px;text-transform:uppercase}
.ib{position:relative;display:flex;align-items:center;gap:8px;padding:0 14px;height:42px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--bdr);transition:border-color .2s,box-shadow .2s}
.ib:focus-within{border-color:rgba(129,140,248,.4);box-shadow:0 0 0 3px rgba(129,140,248,.08),0 0 20px rgba(129,140,248,.05)}
.ic{color:var(--t3);flex-shrink:0}
.ip{flex:1;background:none;border:none;outline:none;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px}
.ip::placeholder{color:#3f506e}
.bs{position:relative;width:100%;height:46px;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;overflow:hidden;background:transparent;margin-top:6px;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.bs:hover{transform:translateY(-2px);box-shadow:0 12px 44px rgba(99,102,241,.3),0 4px 16px rgba(99,102,241,.15),0 0 0 1px rgba(129,140,248,.15)}
.bf{position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,#6366f1 0%,#7c3aed 35%,#a855f7 65%,#818cf8 100%);background-size:250% 250%;animation:gs 5s ease infinite}
@keyframes gs{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.bh{position:absolute;inset:0;border-radius:14px;background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.12) 50%,transparent 65%);transform:translateX(-110%)}
.bs:hover .bh{animation:ss .7s ease forwards}
@keyframes ss{to{transform:translateX(110%)}}
.bl{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:8px}
.ol{display:flex;align-items:center;gap:14px;margin:22px 0 18px}
.ol span{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--bdr),transparent)}
.ol em{font-style:normal;font-size:11px;font-weight:500;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.sr{text-align:center;font-size:13px;color:var(--t2)}
.sr a{font-weight:700;color:var(--a);text-decoration:none;transition:color .2s}
.sr a:hover{color:var(--a2)}
.arr{display:inline-block;transition:transform .2s cubic-bezier(.34,1.56,.64,1);margin-left:2px}
.sr a:hover .arr{transform:translateX(4px)}
@media(max-width:700px){.ly{flex-direction:column;gap:24px}.hc{flex:none}.hi{align-items:center;text-align:center;max-width:360px}.hd{text-align:center}.fg{display:none}.cc{width:100%;max-width:380px}.wv,.rr{display:none}}
</style>

<div class="u">
  <div class="bg">
    <canvas id="cv"></canvas>
    <div class="aur"></div>
    <div class="wv" id="wvw"></div>
    <div class="rr">
      <div class="ri r1"></div>
      <div class="ri r2"></div>
      <div class="ri r3"></div>
    </div>
    <div class="gr"></div>
    <div class="vi"></div>
  </div>

  <div class="ly">
    <div class="hc">
      <div class="hi">
        <div class="lg">
          <div class="li">
            <svg viewBox="0 0 48 48" fill="none">
              <defs><linearGradient id="g" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#e879f9"/></linearGradient></defs>
              <path d="M10 28a14 14 0 0 1 28 0" stroke="url(#g)" stroke-width="2" stroke-linecap="round" opacity="0.3" class="sig s1"/>
              <path d="M15 28a9 9 0 0 1 18 0" stroke="url(#g)" stroke-width="2" stroke-linecap="round" opacity="0.5" class="sig s2"/>
              <path d="M20 28a4 4 0 0 1 8 0" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" opacity="0.8" class="sig s3"/>
              <circle cx="24" cy="30" r="3" fill="url(#g)"/>
              <rect x="13" y="35" width="2.5" height="6" rx="1.25" fill="#818cf8" opacity=".6" class="ba b1"/>
              <rect x="18" y="33" width="2.5" height="8" rx="1.25" fill="#a78bfa" opacity=".7" class="ba b2"/>
              <rect x="23" y="34" width="2.5" height="7" rx="1.25" fill="#c084fc" opacity=".8" class="ba b3"/>
              <rect x="28" y="32" width="2.5" height="9" rx="1.25" fill="#e879f9" opacity=".7" class="ba b4"/>
              <rect x="33" y="35" width="2.5" height="6" rx="1.25" fill="#818cf8" opacity=".6" class="ba b5"/>
            </svg>
          </div>
          <div class="lt">
            <span class="ln">STREAM</span>
            <span class="ls">—</span>
            <span class="ln la">HUB</span>
          </div>
          <p class="lb">LIVE · SHARE · CONNECT</p>
        </div>
        <p class="hd">Nền tảng phát trực tuyến video thời gian thực bằng WebRTC.<br/>Kết nối, chia sẻ và cộng tác liền mạch.</p>
        <div class="fg" id="fgrid"></div>
      </div>
    </div>

    <div class="cc">
      <div class="ac">
        <div class="gt"></div>
        <div class="go"></div>
        <div class="ch">
          <h1 class="ct">Chào mừng trở lại</h1>
          <p class="cs">Đăng nhập để tiếp tục</p>
        </div>
        <div class="af">
          <div class="iw">
            <label class="il">Tên người dùng</label>
            <div class="ib">
              <svg class="ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input class="ip" placeholder="Nhập tên người dùng"/>
            </div>
          </div>
          <div class="iw">
            <label class="il">Mật khẩu</label>
            <div class="ib">
              <svg class="ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input class="ip" type="password" placeholder="Nhập mật khẩu"/>
            </div>
          </div>
          <button class="bs">
            <span class="bf"></span>
            <span class="bh"></span>
            <span class="bl">Đăng nhập</span>
          </button>
        </div>
        <div class="ol"><span></span><em>or</em><span></span></div>
        <p class="sr">Chưa có tài khoản? <a href="#">Tạo tài khoản <span class="arr">→</span></a></p>
      </div>
    </div>
  </div>
</div>

<script>
var feats = [
  {icon:'⚡',t:'Độ trễ thấp',d:'Phát trực tiếp siêu nhanh'},
  {icon:'🖥',t:'Chất lượng HD',d:'Video & âm thanh sắc nét'},
  {icon:'🛡',t:'Bảo mật',d:'Mã hóa đầu cuối E2E'},
  {icon:'🌐',t:'WebRTC',d:'Peer-to-peer protocol'},
  {icon:'📦',t:'Đa phòng',d:'Quản lý nhiều phòng'},
  {icon:'🎬',t:'Ghi hình',d:'Xuất MP4 / HLS'}
];
var fgrid = document.getElementById('fgrid');
var icons = {
  zap:'<polygon points="10,1 3,11 9,11 8,19 17,9 11,9"/>',
  monitor:'<rect x="2" y="3" width="16" height="11" rx="1.5"/><line x1="7" y1="17" x2="13" y2="17"/><line x1="10" y1="14" x2="10" y2="17"/>',
  shield:'<path d="M10 1.5L2.5 5v4.5c0 4.5 3.2 8.7 7.5 9.5 4.3-.8 7.5-5 7.5-9.5V5z"/>',
  globe:'<circle cx="10" cy="10" r="8"/><ellipse cx="10" cy="10" rx="3.5" ry="8"/><line x1="2" y1="10" x2="18" y2="10"/>',
  layers:'<polygon points="10,1 1,6 10,11 19,6"/><polyline points="1,10 10,15 19,10"/><polyline points="1,14 10,19 19,14"/>',
  film:'<rect x="2" y="2" width="16" height="16" rx="1.5"/><line x1="2" y1="6" x2="18" y2="6"/><line x1="2" y1="14" x2="18" y2="14"/><line x1="6" y1="2" x2="6" y2="6"/><line x1="14" y1="2" x2="14" y2="6"/><line x1="6" y1="14" x2="6" y2="18"/><line x1="14" y1="14" x2="14" y2="18"/>'
};
var iconKeys = ['zap','monitor','shield','globe','layers','film'];
feats.forEach(function(f,i){
  var d = document.createElement('div');
  d.className = 'fc';
  d.style.animationDelay = (0.8+i*0.08)+'s';
  d.innerHTML = '<div class="fiw"><svg class="fs" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+icons[iconKeys[i]]+'</svg></div><div><span class="ft">'+f.t+'</span><span class="fd">'+f.d+'</span></div>';
  fgrid.appendChild(d);
});

// Waveform
var wvw = document.getElementById('wvw');
for(var i=0;i<48;i++){
  var b = document.createElement('span');
  b.className = 'wb';
  b.style.animationDelay = (i*0.06)+'s';
  b.style.animationDuration = (1.2+Math.random()*1.4)+'s';
  wvw.appendChild(b);
}

// Constellation canvas
var cvs = document.getElementById('cv');
var dpr = window.devicePixelRatio||1;
function resizeCvs(){cvs.width=cvs.offsetWidth*dpr;cvs.height=cvs.offsetHeight*dpr}
resizeCvs();
window.addEventListener('resize',resizeCvs);

var N=70, nds=[];
for(var i=0;i<N;i++) nds.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.0003,vy:(Math.random()-.5)*.0003,r:Math.random()*1.5+.5,p:Math.random()*6.28});

var ctx=cvs.getContext('2d');
function draw(){
  var w=cvs.width,h=cvs.height;
  ctx.clearRect(0,0,w,h);
  for(var i=0;i<N;i++){
    var n=nds[i];n.x+=n.vx;n.y+=n.vy;n.p+=.015;
    if(n.x<0||n.x>1)n.vx*=-1;
    if(n.y<0||n.y>1)n.vy*=-1;
  }
  for(var i=0;i<N;i++)for(var j=i+1;j<N;j++){
    var dx=nds[i].x-nds[j].x,dy=nds[i].y-nds[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<.14){var a=(1-d/.14)*.15;ctx.beginPath();ctx.moveTo(nds[i].x*w,nds[i].y*h);ctx.lineTo(nds[j].x*w,nds[j].y*h);ctx.strokeStyle='rgba(129,140,248,'+a+')';ctx.lineWidth=.5*dpr;ctx.stroke();}
  }
  for(var i=0;i<N;i++){var n=nds[i],g=.4+Math.sin(n.p)*.3;ctx.beginPath();ctx.arc(n.x*w,n.y*h,n.r*dpr,0,6.28);ctx.fillStyle='rgba(167,139,250,'+g+')';ctx.fill();}
  requestAnimationFrame(draw);
}
draw();
</script>
